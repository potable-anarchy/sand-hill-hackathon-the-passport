<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sand Hill cypress at sunset">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a06a"/>
      <stop offset="35%" stop-color="#d8865e"/>
      <stop offset="62%" stop-color="#a87557"/>
      <stop offset="100%" stop-color="#4a5444"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d4837"/>
      <stop offset="100%" stop-color="#262d23"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="40%" r="0.4">
      <stop offset="0%" stop-color="#ffe7b5" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#f6c08a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f6c08a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="600" height="750" fill="url(#sky)"/>

  <!-- soft sun glow -->
  <ellipse cx="300" cy="300" rx="240" ry="200" fill="url(#sun)"/>

  <!-- distant hills -->
  <path d="M0,520 Q150,470 300,490 T600,500 L600,750 L0,750 Z" fill="url(#hill)" opacity="0.55"/>

  <!-- closer hills -->
  <path d="M0,580 Q200,540 380,560 T600,575 L600,750 L0,750 Z" fill="#1f2620"/>

  <!-- cypress silhouettes -->
  <g fill="#0e120d">
    <ellipse cx="120" cy="540" rx="28" ry="105"/>
    <ellipse cx="155" cy="565" rx="20" ry="85"/>
    <ellipse cx="465" cy="555" rx="32" ry="115"/>
    <ellipse cx="500" cy="580" rx="22" ry="90"/>
    <ellipse cx="305" cy="615" rx="18" ry="65"/>
    <ellipse cx="270" cy="630" rx="14" ry="50"/>
  </g>

  <!-- foreground grasses / texture -->
  <g stroke="#0a0d09" stroke-width="1" opacity="0.6">
    <line x1="40" y1="730" x2="55" y2="685"/>
    <line x1="75" y1="730" x2="85" y2="690"/>
    <line x1="110" y1="730" x2="120" y2="695"/>
    <line x1="490" y1="730" x2="505" y2="695"/>
    <line x1="540" y1="730" x2="555" y2="690"/>
  </g>

  <!-- subtle film grain via dotted overlay -->
  <g fill="#000" opacity="0.05">
    <circle cx="80" cy="200" r="1"/>
    <circle cx="320" cy="140" r="1"/>
    <circle cx="510" cy="220" r="1"/>
    <circle cx="200" cy="350" r="1"/>
    <circle cx="400" cy="380" r="1"/>
  </g>
</svg>
